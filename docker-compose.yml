services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./exports:/app/exports
    environment:
      - DISPLAY=:99
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - db
  
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buildsmart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: